name: Build Cross-Platform App
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-desktop:
    name: Build Desktop App
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust (Tauri)
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js Static Site
        run: npm run build

      - name: Install Rust targets (for universal macOS build)
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - name: Build Desktop (Tauri)
        run: |
          npm install -g @tauri-apps/cli
          if [ "${{ matrix.platform }}" = "macos-latest" ]; then
            npm run tauri:build -- --target universal-apple-darwin
          else
            npm run tauri:build
          fi
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Desktop-${{ matrix.platform }}
          path: |
            src-tauri/target/**/*.dmg
            src-tauri/target/**/*.exe
            src-tauri/target/**/*.msi
            src-tauri/target/**/*.app

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;25.0.8775105"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js Static Site
        run: npm run build

      - name: Build Android APK (Tauri)
        run: |
          npm install -g @tauri-apps/cli
          export ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.0.8775105
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.0.8775105
          export NDK_HOME=$ANDROID_HOME/ndk/25.0.8775105
          npx tauri android init
          npx tauri android build --apk
        shell: bash

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: src-tauri/**/*.apk


